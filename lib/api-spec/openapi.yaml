openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: OneChat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profiles
    description: User profile operations
  - name: matches
    description: Daily match operations
  - name: messages
    description: Chat message operations
  - name: reactions
    description: Message reaction operations
  - name: blocks
    description: Block operations
  - name: moderation
    description: Report and moderation operations
  - name: storage
    description: Object storage operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get own profile
      responses:
        "200":
          description: Own profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/setup:
    post:
      operationId: setupProfile
      tags: [profiles]
      summary: Create initial profile on first login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileSetup"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /matches/today:
    get:
      operationId: getTodayMatch
      tags: [matches]
      summary: Get or initiate today's match
      description: Returns the current match state for today — found, waiting, ended, or blocked
      responses:
        "200":
          description: Today's match state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchState"

  /matches/{matchId}/end:
    post:
      operationId: endMatch
      tags: [matches]
      summary: End the active match (and optionally block partner)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndMatchInput"
      responses:
        "200":
          description: Match ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchState"

  /matches/archive:
    get:
      operationId: getMatchArchive
      tags: [matches]
      summary: Get past matches with search and pagination
      parameters:
        - name: q
          in: query
          required: false
          description: Search by partner name, icebreaker, or message content
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: List of archived matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchivedMatch"

  /matches/{matchId}/messages:
    get:
      operationId: getMatchMessages
      tags: [messages]
      summary: Get messages for a match (cursor pagination)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          required: false
          description: Return messages created before this message ID
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 30
      responses:
        "200":
          description: List of messages (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in the active match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Match is not active or expired

  /matches/{matchId}/messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a sent message (text only, own messages only)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEditInput"
      responses:
        "200":
          description: Message edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not your message or message is deleted
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Unsend a message for both participants
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not your message

  /matches/{matchId}/messages/{messageId}/viewed:
    post:
      operationId: markMediaViewed
      tags: [messages]
      summary: Mark a view-once media message as viewed
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked viewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /matches/{matchId}/messages/{messageId}/reactions:
    get:
      operationId: getMessageReactions
      tags: [reactions]
      summary: Get reactions for a message
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reaction summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReactionSummary"
    post:
      operationId: addReaction
      tags: [reactions]
      summary: Add a reaction to a message
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "201":
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionAdded"

  /matches/{matchId}/messages/{messageId}/reactions/{emoji}:
    delete:
      operationId: removeReaction
      tags: [reactions]
      summary: Remove a reaction from a message
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reaction removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reports:
    post:
      operationId: createReport
      tags: [moderation]
      summary: Report a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportCreated"

  /blocks:
    get:
      operationId: getBlockList
      tags: [blocks]
      summary: List users blocked by the current user
      responses:
        "200":
          description: Block list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockEntry"

  /blocks/{blockedId}:
    delete:
      operationId: unblockUser
      tags: [blocks]
      summary: Unblock a user
      parameters:
        - name: blockedId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for direct GCS upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Profile:
      type: object
      required: [id, userId, displayName, avatarUrl, icebreaker, lastActive, createdAt, isPremium]
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
        aura:
          type: ["string", "null"]
        lastActive:
          type: string
        createdAt:
          type: string
        isPremium:
          type: boolean
        premiumGrantedAt:
          type: ["string", "null"]
        nameColor:
          type: ["string", "null"]
        fontFamily:
          type: ["string", "null"]
        fontSize:
          type: ["string", "null"]
        wallpaper:
          type: ["string", "null"]

    ProfileSetup:
      type: object
      required: [displayName, icebreaker]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 40
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
          minLength: 1
          maxLength: 200
        aura:
          type: ["string", "null"]

    ProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 40
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
          minLength: 1
          maxLength: 200
        aura:
          type: ["string", "null"]
        nameColor:
          type: ["string", "null"]
        fontFamily:
          type: ["string", "null"]
        fontSize:
          type: ["string", "null"]
        wallpaper:
          type: ["string", "null"]

    MatchPartner:
      type: object
      required: [userId, displayName, avatarUrl, icebreaker]
      properties:
        userId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
        aura:
          type: ["string", "null"]
        lastActive:
          type: ["string", "null"]

    MatchState:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, waiting, ended, blocked, no_profile]
        matchId:
          type: ["string", "null"]
        partner:
          oneOf:
            - $ref: "#/components/schemas/MatchPartner"
            - type: "null"
        matchDate:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]

    EndMatchInput:
      type: object
      required: [block]
      properties:
        block:
          type: boolean

    Message:
      type: object
      required: [id, matchId, senderId, content, isDeleted, isViewOnce, createdAt]
      properties:
        id:
          type: string
        matchId:
          type: string
        senderId:
          type: string
        content:
          type: string
        replyToId:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isDeleted:
          type: boolean
        isViewOnce:
          type: boolean
        viewedAt:
          type: ["string", "null"]
        editedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    MessageInput:
      type: object
      properties:
        content:
          type: string
          maxLength: 2000
        replyToId:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isViewOnce:
          type: boolean

    MessageEditInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000

    ArchivedMatch:
      type: object
      required: [matchId, matchDate, partnerName, messageCount, status]
      properties:
        matchId:
          type: string
        matchDate:
          type: string
        partnerName:
          type: string
        partnerAvatarUrl:
          type: ["string", "null"]
        partnerIcebreaker:
          type: ["string", "null"]
        partnerAura:
          type: ["string", "null"]
        messageCount:
          type: integer
        status:
          type: string
        firstMessage:
          type: ["string", "null"]
        conversationDuration:
          type: ["integer", "null"]
          description: Duration of conversation in minutes (time between first and last message)

    ReactionSummary:
      type: object
      required: [emoji, count, byMe]
      properties:
        emoji:
          type: string
        count:
          type: integer
        byMe:
          type: boolean

    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string

    ReactionAdded:
      type: object
      required: [messageId, emoji, userId]
      properties:
        messageId:
          type: string
        emoji:
          type: string
        userId:
          type: string

    ReportInput:
      type: object
      required: [reportedUserId, reason]
      properties:
        reportedUserId:
          type: string
        matchId:
          type: ["string", "null"]
        reason:
          type: string
          enum: [spam, harassment, inappropriate, other]
        details:
          type: ["string", "null"]
          maxLength: 1000

    ReportCreated:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
        success:
          type: boolean

    BlockEntry:
      type: object
      required: [id, blockedId, createdAt]
      properties:
        id:
          type: string
        blockedId:
          type: string
        createdAt:
          type: string

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
