openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OneChat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profiles
    description: User profile operations
  - name: matches
    description: Daily match operations
  - name: messages
    description: Chat message operations
  - name: blocks
    description: Block operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get own profile
      responses:
        "200":
          description: Own profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/setup:
    post:
      operationId: setupProfile
      tags: [profiles]
      summary: Create initial profile on first login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileSetup"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /matches/today:
    get:
      operationId: getTodayMatch
      tags: [matches]
      summary: Get or initiate today's match
      description: Returns the current match state for today — found, waiting, ended, or blocked
      responses:
        "200":
          description: Today's match state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchState"

  /matches/{matchId}/end:
    post:
      operationId: endMatch
      tags: [matches]
      summary: End the active match (and optionally block partner)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndMatchInput"
      responses:
        "200":
          description: Match ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchState"

  /matches/archive:
    get:
      operationId: getMatchArchive
      tags: [matches]
      summary: Get all past matches for the archive/gallery
      responses:
        "200":
          description: List of archived matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchivedMatch"

  /matches/{matchId}/messages:
    get:
      operationId: getMatchMessages
      tags: [messages]
      summary: Get all messages for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in the active match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Match is not active or expired

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Profile:
      type: object
      required: [id, userId, displayName, avatarUrl, icebreaker, lastActive, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
        lastActive:
          type: string
        createdAt:
          type: string

    ProfileSetup:
      type: object
      required: [displayName, icebreaker]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 40
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
          minLength: 1
          maxLength: 200

    ProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 40
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
          minLength: 1
          maxLength: 200

    MatchPartner:
      type: object
      required: [userId, displayName, avatarUrl, icebreaker]
      properties:
        userId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        icebreaker:
          type: string
        lastActive:
          type: ["string", "null"]

    MatchState:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, waiting, ended, blocked, no_profile]
        matchId:
          type: ["string", "null"]
        partner:
          oneOf:
            - $ref: "#/components/schemas/MatchPartner"
            - type: "null"
        matchDate:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]

    EndMatchInput:
      type: object
      required: [block]
      properties:
        block:
          type: boolean

    Message:
      type: object
      required: [id, matchId, senderId, content, createdAt]
      properties:
        id:
          type: string
        matchId:
          type: string
        senderId:
          type: string
        content:
          type: string
        replyToId:
          type: ["string", "null"]
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000
        replyToId:
          type: ["string", "null"]

    ArchivedMatch:
      type: object
      required: [matchId, matchDate, partnerName, messageCount, status]
      properties:
        matchId:
          type: string
        matchDate:
          type: string
        partnerName:
          type: string
        partnerAvatarUrl:
          type: ["string", "null"]
        messageCount:
          type: integer
        status:
          type: string
        firstMessage:
          type: ["string", "null"]
